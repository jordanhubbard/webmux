name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webmux/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: webmux

      - name: Type check
        run: npm run typecheck
        working-directory: webmux

      - name: Lint
        run: npm run lint
        working-directory: webmux

      - name: Run backend tests
        run: npm run test --workspace=backend
        working-directory: webmux

  build:
    name: Build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webmux/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: webmux

      - name: Build
        run: npm run build
        working-directory: webmux
