app:
  name: webmux
  listen_host: 0.0.0.0
  http_port: 8080
  https_port: 8443
  secure_mode: false
  trusted_http_allowed: true
  default_term:
    cols: 80
    rows: 24
    font_size: 14
    font_family: Consolas, Menlo, "DejaVu Sans Mono", monospace
  terminal_grid:
    max_cols: null
    max_rows: null
  ui:
    default_pane: terminals
    host_switcher:
      enabled: false
      suffixes: []
      hosts: []
  agents:
    enabled: false
    combined_pane: true
    disable_in_multi_user_mode: true
    definitions: []
  transport:
    prefer_mosh: false
    ssh_fallback: true
    mosh_server_path: ""
  guacd:
    host: 127.0.0.1
    port: 4822
